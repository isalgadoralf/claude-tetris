name: Claude Issue Triage

on:
  issues:
    types: [opened, edited]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Issue Triage
        id: claude-triage
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Analiza el issue #${{ github.event.issue.number }} de este repositorio (proyecto Tetris en JavaScript vanilla, ver CLAUDE.md para arquitectura).

            Tareas:
            1. Lee el título y cuerpo del issue, y revisa el código relevante en el repo (game.js, index.html, style.css) para entender el contexto.
            2. Asigna los labels que correspondan usando ÚNICAMENTE labels que ya existen en el repositorio (bug, documentation, enhancement, good first issue, help wanted, invalid, question, wontfix, duplicate). No crees labels nuevos. Usa `gh issue edit` para aplicarlos.
            3. Publica UN comentario en el issue (con `gh issue comment`) con un diagnóstico general que incluya:
               - Resumen del problema en una o dos frases.
               - Causa probable o área del código involucrada (archivo/función si aplica).
               - Sugerencia de enfoque para la solución (sin implementarla todavía).
            No modifiques código ni abras PRs — solo etiqueta y comenta.
          claude_args: '--allowed-tools "Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh issue view:*),Bash(gh label list:*)"'
